<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DDPW Moneybook Flux</title>
  
  <!-- 외부 라이브러리 -->
  <script src="https://apis.google.com/js/api.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/modal.css">
</head>
<body>
  <!-- 헤더 -->
  <div class="header">
    <div class="title">💰 DDPW Moneybook Flux <span class="version">V.001</span></div>
    <div style="display: flex; align-items: center; gap: 12px;">
      <div id="google-auth-status" style="font-size: 0.9rem; color: #6B7280;"></div>
      <button id="google-login-btn" class="header-btn" style="display: none;">🔐 Google 로그인</button>
      <button id="google-logout-btn" class="header-btn" style="display: none;">🚪 로그아웃</button>
      <button id="google-sync-btn" class="header-btn" style="display: none;">🔄 동기화</button>
    </div>
  </div>

  <!-- 네비게이션 -->
  <nav class="nav" id="nav-tabs">
    <button class="nav-tab active" data-tab="dashboard">월별현황</button>
    <button class="nav-tab" data-tab="accounts">계좌 입출금 관리</button>
    <button class="nav-tab" data-tab="cards">카드 관리</button>
    <button class="nav-tab" data-tab="saving">저축관리</button>
    <button class="nav-tab" data-tab="stats">통계</button>
    <button class="nav-tab" data-tab="settings">설정</button>
  </nav>

  <!-- 월 선택 바 -->
  <div class="month-bar">
    <button class="month-btn" id="prev-month" title="이전 달">◀</button>
    <span id="month-text">2025년 11월</span>
    <button class="month-btn" id="next-month" title="다음 달">▶</button>
  </div>

  <!-- 메인 콘텐츠 (동적 로드) -->
  <main class="main-content" id="main-content">
    <!-- 탭별 콘텐츠가 여기에 로드됨 -->
  </main>

  <!-- FAB 버튼 -->
  <button class="fab" id="fab-btn" title="입력 추가">+</button>

  <!-- 모달들 (modal.js에서 관리) -->
  <div id="modal-overlay"></div>
  <div id="account-modal-overlay"></div>
  <div id="merchant-modal-overlay"></div>
  <div id="card-payment-modal-overlay"></div>

  <!-- JavaScript 로드 (순서 중요!) -->
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/data-manager.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/accounts.js"></script>
  <script src="js/cards.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/saving.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
